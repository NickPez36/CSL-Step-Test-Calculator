name: Validate session seed JSON

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse session files
        run: |
          node -e "
            const fs = require('fs');
            for (const p of ['server/data/sessions.json', 'react-app/public/demo-sessions.json']) {
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              if (!Array.isArray(j.sessions)) throw new Error(p + ': missing sessions array');
              console.log(p + ': OK (' + j.sessions.length + ' sessions)');
            }
          "
